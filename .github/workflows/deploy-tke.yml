# This workflow builds a docker container, publishes and deploys it to
# Tencent Kubernetes Engine (TKE) when there is a push to the "main" branch.
#
# Secrets required (Settings вЖТ Secrets and variables вЖТ Actions вЖТ Environments вЖТ production):
#   - TENCENT_CLOUD_SECRET_ID    вАФ иЕЊиЃѓдЇС API еѓЖйТ• ID
#   - TENCENT_CLOUD_SECRET_KEY   вАФ иЕЊиЃѓдЇС API еѓЖйТ• Secret
#   - TENCENT_CLOUD_ACCOUNT_ID   вАФ иЕЊиЃѓдЇСиі¶жИЈ ID
#   - TKE_REGISTRY_PASSWORD      вАФ TKE йХЬеГПдїУеЇУеѓЖз†Б

name: Tencent Kubernetes Engine

on:
  push:
    branches: [ "main" ]

env:
  TKE_IMAGE_URL: sgccr.ccs.tencentyun.com/cowallet/cowallet
  TKE_REGION: ap-singapore
  TKE_CLUSTER_ID: cls-c63h33ne
  DEPLOYMENT_NAME: cowallet

permissions:
  contents: read

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build
      - name: Build Docker image
        run: |
          docker build -t ${TKE_IMAGE_URL}:${GITHUB_SHA} .

      - name: Login TKE Registry
        run: |
          docker login -u ${{ secrets.TENCENT_CLOUD_ACCOUNT_ID }} -p '${{ secrets.TKE_REGISTRY_PASSWORD }}' ${TKE_IMAGE_URL}

      # Push the Docker image to TKE Registry
      - name: Publish
        run: |
          docker push ${TKE_IMAGE_URL}:${GITHUB_SHA}

      - name: Set up Kustomize
        run: |
          curl -o kustomize --location https://github.com/kubernetes-sigs/kustomize/releases/download/v3.1.0/kustomize_3.1.0_linux_amd64
          chmod u+x ./kustomize

      - name: Set up ~/.kube/config for connecting TKE cluster
        uses: TencentCloud/tke-cluster-credential-action@v1
        with:
          secret_id: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          secret_key: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
          tke_region: ${{ env.TKE_REGION }}
          cluster_id: ${{ env.TKE_CLUSTER_ID }}

      - name: Switch to TKE context
        run: |
          kubectl config use-context ${TKE_CLUSTER_ID}-context-default

      # Deploy the Docker image to the TKE cluster
      - name: Deploy
        run: |
          cd k8s
          ../kustomize edit set image ${TKE_IMAGE_URL}:${GITHUB_SHA}
          ../kustomize build . | kubectl apply -f -
          kubectl rollout status deployment/${DEPLOYMENT_NAME} -n cowallet
          kubectl get services -o wide -n cowallet

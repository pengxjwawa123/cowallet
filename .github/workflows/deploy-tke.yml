name: Deploy to TKE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  TKE_CLUSTER_ID: cls-c63h33ne
  TKE_REGION: ap-singapore
  DEPLOYMENT_NAME: cowallet
  REGISTRY: sgccr.ccs.tencentyun.com
  IMAGE_NAME: cowallet

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Tencent Cloud credentials
        env:
          TENCENT_CLOUD_ACCOUNT_ID: ${{ secrets.TENCENT_CLOUD_ACCOUNT_ID }}
          TENCENT_CLOUD_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENT_CLOUD_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
        run: |
          if [ -z "$TENCENT_CLOUD_ACCOUNT_ID" ] || [ -z "$TENCENT_CLOUD_SECRET_ID" ] || [ -z "$TENCENT_CLOUD_SECRET_KEY" ]; then
            echo "❌ ERROR: Tencent Cloud credentials are not set!"
            echo "Please configure the following GitHub Secrets:"
            echo "  - TENCENT_CLOUD_ACCOUNT_ID"
            echo "  - TENCENT_CLOUD_SECRET_ID"
            echo "  - TENCENT_CLOUD_SECRET_KEY"
            exit 1
          fi
          
          mkdir -p ~/.tencent
          cat > ~/.tencent/config << EOF
          TENCENT_CLOUD_ACCOUNT_ID=${TENCENT_CLOUD_ACCOUNT_ID}
          TENCENT_CLOUD_SECRET_ID=${TENCENT_CLOUD_SECRET_ID}
          TENCENT_CLOUD_SECRET_KEY=${TENCENT_CLOUD_SECRET_KEY}
          TENCENT_CLOUD_REGION=ap-singapore
          EOF
          chmod 600 ~/.tencent/config
          echo "✅ Tencent Cloud credentials configured"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Get TKE kubeconfig
        run: |
          echo "🔑 Retrieving kubeconfig for cluster: ${{ env.TKE_CLUSTER_ID }}"
          
          # 创建 .kube 目录
          mkdir -p ~/.kube
          
          # 从 GitHub Secret 解码并写入 kubeconfig
          if [ -z "${{ secrets.KUBECONFIG }}" ]; then
            echo "❌ ERROR: KUBECONFIG secret is not set!"
            echo "Please configure GitHub Secret 'KUBECONFIG' with base64-encoded kubeconfig content"
            echo ""
            echo "步骤："
            echo "1. 从 TKE 控制台获取 kubeconfig 文件"
            echo "2. 本地转为 Base64: cat kubeconfig | base64 > kubeconfig.b64"
            echo "3. 复制内容到 GitHub Secret: Settings → Secrets → KUBECONFIG"
            exit 1
          fi
          
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          
          echo "✅ kubeconfig 已设置"
          kubectl config view --minify

      - name: Verify cluster connection
        run: kubectl cluster-info

      - name: Generate image tag
        id: image
        run: |
          COMMIT_SHA=${{ github.sha }}
          SHORT_SHA=${COMMIT_SHA:0:7}
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=${SHORT_SHA}
          fi
          
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" >> $GITHUB_OUTPUT

      - name: Update deployment
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            api-server=${{ steps.image.outputs.image }} \
            mpc-relay=${{ steps.image.outputs.image }} \
            indexer=${{ steps.image.outputs.image }} \
            worker=${{ steps.image.outputs.image }} \
            -n cowallet \
            --record

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n cowallet \
            --timeout=5m

      - name: Verify deployment
        run: |
          echo "✅ Deployment successful!"
          kubectl get pods -n cowallet
          kubectl describe deployment ${{ env.DEPLOYMENT_NAME }} -n cowallet

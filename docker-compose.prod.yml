services:
  # ────────────────────────────────────────────────────────────────
  # 基础设施
  # ────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: cowallet-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cowallet}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/sync-password.sh:/usr/local/bin/sync-password.sh:ro
    entrypoint: ["/usr/local/bin/sync-password.sh", "postgres"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cowallet
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: cowallet-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cowallet
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  nats:
    image: nats:2-alpine
    container_name: cowallet-nats
    command: -js -m 8222 --http_port 8222
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cowallet
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────
  # cowallet 后端服务
  # ────────────────────────────────────────────────────────────────

  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cowallet-api-server
    command: api-server
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cowallet}
      RPC_URL: ${RPC_URL:-https://1rpc.io/eth}
      RPC_WS_URL: ${RPC_WS_URL:-wss://1rpc.io/eth}
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      COVALENT_API_KEY: ${COVALENT_API_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      ETH_MAINNET_RPC_URL: ${ETH_MAINNET_RPC_URL:-}
      BASE_MAINNET_RPC_URL: ${BASE_MAINNET_RPC_URL:-}
      ARB_MAINNET_RPC_URL: ${ARB_MAINNET_RPC_URL:-}
      OP_MAINNET_RPC_URL: ${OP_MAINNET_RPC_URL:-}
      BSC_MAINNET_RPC_URL: ${BSC_MAINNET_RPC_URL:-}
      POLYGON_MAINNET_RPC_URL: ${POLYGON_MAINNET_RPC_URL:-}
      ETH_SEPOLIA_RPC_URL: ${ETH_SEPOLIA_RPC_URL:-}
      BASE_SEPOLIA_RPC_URL: ${BASE_SEPOLIA_RPC_URL:-}
      RUST_LOG: info,api_server=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - cowallet
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  mpc-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cowallet-mpc-relay
    command: mpc-relay
    environment:
      NATS_URL: nats://nats:4222
      RUST_LOG: info,mpc_relay=info
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - cowallet
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cowallet-worker
    command: worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cowallet}
      REDIS_URL: redis://redis:6379
      RUST_LOG: info,worker=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cowallet
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

networks:
  cowallet:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local

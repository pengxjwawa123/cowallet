apiVersion: apps/v1
kind: Deployment
metadata:
  name: cowallet
  namespace: cowallet
  labels:
    app: cowallet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cowallet
  template:
    metadata:
      labels:
        app: cowallet
    spec:
      containers:
        - name: api-server
          image: sgccr.ccs.tencentyun.com/cowallet/cowallet:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cowallet-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cowallet-secrets
                  key: redis-url
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: cowallet-secrets
                  key: nats-url
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cowallet-secrets
                  key: claude-api-key
            - name: RPC_URL
              value: "https://sepolia.base.org"
            - name: RUST_LOG
              value: "info"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

services:
  # ────────────────────────────────────────────────────────────────
  # 基础设施服务
  # ────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: cowallet-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres  # ⚠️ 改为强密码
      POSTGRES_DB: cowallet
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cowallet

  redis:
    image: redis:7-alpine
    container_name: cowallet-redis
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cowallet

  nats:
    image: nats:2-alpine
    container_name: cowallet-nats
    command: -js -m 8222 --http_port 8222
    ports:
      - "127.0.0.1:4223:4222"    # NATS 客户端
      - "127.0.0.1:8223:8222"    # HTTP 管理
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cowallet

  # ────────────────────────────────────────────────────────────────
  # cowallet 后端服务
  # ────────────────────────────────────────────────────────────────

  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cowallet-api-server
    command: api-server
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cowallet
      RPC_URL: https://sepolia.base.org
      RPC_WS_URL: wss://sepolia.base.org
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      COVALENT_API_KEY: ${COVALENT_API_KEY}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080,http://localhost:5173,https://devapi.cowallet.ai
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      RUST_LOG: info,api_server=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - cowallet
    restart: unless-stopped

  mpc-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cowallet-mpc-relay
    command: mpc-relay
    environment:
      NATS_URL: nats://nats:4222
      RUST_LOG: info,mpc_relay=debug
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - cowallet
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cowallet-worker
    command: worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cowallet
      REDIS_URL: redis://redis:6379
      RUST_LOG: info,worker=debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cowallet
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────
  # 监控和管理（可选）
  # ────────────────────────────────────────────────────────────────

  adminer:
    image: adminer:latest
    container_name: cowallet-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - cowallet

# ────────────────────────────────────────────────────────────────
# 网络和存储
# ────────────────────────────────────────────────────────────────

networks:
  cowallet:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local
